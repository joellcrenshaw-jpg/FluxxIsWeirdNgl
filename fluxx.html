<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Roblox Lookup</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#050505;
    color:white;
    min-height:100vh;
    padding:40px;
}

.container{
    max-width:1200px;
    margin:auto;
}

.title{
    text-align:center;
    font-size:55px;
    margin-bottom:40px;
    background:linear-gradient(90deg,#7c3aed,#3b82f6);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.search-box{
    display:flex;
    gap:15px;
    justify-content:center;
    margin-bottom:40px;
}

.search-box input{
    width:500px;
    max-width:100%;
    background:#111;
    border:1px solid #333;
    color:white;
    padding:15px;
    border-radius:12px;
    font-size:18px;
    outline:none;
}

.search-box button{
    background:#7c3aed;
    border:none;
    color:white;
    padding:15px 30px;
    border-radius:12px;
    font-size:18px;
    cursor:pointer;
    transition:0.2s;
}

.search-box button:hover{
    background:#6d28d9;
}

.card{
    background:#111;
    border:1px solid #222;
    border-radius:20px;
    padding:30px;
    margin-bottom:30px;
}

.profile{
    display:flex;
    gap:30px;
    flex-wrap:wrap;
    align-items:center;
}

.avatar{
    width:180px;
    height:180px;
    border-radius:50%;
    border:4px solid #7c3aed;
}

.username{
    font-size:42px;
    margin-bottom:10px;
}

.display{
    color:#888;
    margin-bottom:20px;
    font-size:20px;
}

.stats{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
    gap:20px;
}

.stat{
    background:#0b0b0b;
    padding:15px;
    border-radius:14px;
    border:1px solid #222;
}

.stat-title{
    color:#777;
    margin-bottom:5px;
}

.section-title{
    font-size:35px;
    margin-bottom:20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.group-card,
.badge-card{
    background:#111;
    border:1px solid #222;
    padding:20px;
    border-radius:18px;
}

.group-card h3,
.badge-card h3{
    margin-bottom:10px;
}

.loading{
    text-align:center;
    font-size:24px;
    margin-top:20px;
}

.error{
    color:red;
    text-align:center;
    margin-top:20px;
    font-size:20px;
}

::-webkit-scrollbar{
    width:10px;
}

::-webkit-scrollbar-thumb{
    background:#7c3aed;
    border-radius:999px;
}
</style>
</head>
<body>

<div class="container">

    <h1 class="title">Roblox Lookup</h1>

    <div class="search-box">
        <input
            type="text"
            id="username"
            placeholder="Enter Roblox Username"
        />

        <button onclick="searchUser()">
            Search
        </button>
    </div>

    <div id="loading" class="loading"></div>
    <div id="error" class="error"></div>

    <div id="results"></div>

</div>

<script>

async function searchUser(){

    const username = document.getElementById("username").value.trim();

    const results = document.getElementById("results");
    const loading = document.getElementById("loading");
    const error = document.getElementById("error");

    results.innerHTML = "";
    error.innerHTML = "";

    if(!username){
        error.innerHTML = "Please enter a username.";
        return;
    }

    loading.innerHTML = "Loading...";

    try{

        // USERNAME -> USER ID
        const userResponse = await fetch(
            "https://users.roblox.com/v1/usernames/users",
            {
                method:"POST",
                headers:{
                    "Content-Type":"application/json"
                },
                body:JSON.stringify({
                    usernames:[username]
                })
            }
        );

        const userData = await userResponse.json();

        if(!userData.data.length){
            loading.innerHTML = "";
            error.innerHTML = "User not found.";
            return;
        }

        const user = userData.data[0];
        const userId = user.id;

        // PROFILE
        const profileResponse = await fetch(
            `https://users.roblox.com/v1/users/${userId}`
        );

        const profile = await profileResponse.json();

        // AVATAR
        const avatarResponse = await fetch(
            `https://thumbnails.roblox.com/v1/users/avatar-headshot?userIds=${userId}&size=420x420&format=Png&isCircular=false`
        );

        const avatarData = await avatarResponse.json();

        // FRIENDS
        const friendsResponse = await fetch(
            `https://friends.roblox.com/v1/users/${userId}/friends/count`
        );

        const friends = await friendsResponse.json();

        // FOLLOWERS
        const followersResponse = await fetch(
            `https://friends.roblox.com/v1/users/${userId}/followers/count`
        );

        const followers = await followersResponse.json();

        // FOLLOWING
        const followingResponse = await fetch(
            `https://friends.roblox.com/v1/users/${userId}/followings/count`
        );

        const following = await followingResponse.json();

        // GROUPS
        const groupsResponse = await fetch(
            `https://groups.roblox.com/v2/users/${userId}/groups/roles`
        );

        const groups = await groupsResponse.json();

        // BADGES
        const badgesResponse = await fetch(
            `https://badges.roblox.com/v1/users/${userId}/badges?limit=20&sortOrder=Asc`
        );

        const badges = await badgesResponse.json();

        loading.innerHTML = "";

        results.innerHTML = `
        
        <div class="card">

            <div class="profile">

                <img
                    class="avatar"
                    src="${avatarData.data[0].imageUrl}"
                />

                <div>

                    <div class="username">
                        ${profile.displayName}
                    </div>

                    <div class="display">
                        @${profile.name}
                    </div>

                    <div class="stats">

                        <div class="stat">
                            <div class="stat-title">User ID</div>
                            <div>${userId}</div>
                        </div>

                        <div class="stat">
                            <div class="stat-title">Created</div>
                            <div>
                                ${new Date(profile.created).toLocaleDateString()}
                            </div>
                        </div>

                        <div class="stat">
                            <div class="stat-title">Friends</div>
                            <div>${friends.count}</div>
                        </div>

                        <div class="stat">
                            <div class="stat-title">Followers</div>
                            <div>${followers.count}</div>
                        </div>

                        <div class="stat">
                            <div class="stat-title">Following</div>
                            <div>${following.count}</div>
                        </div>

                    </div>

                </div>

            </div>

        </div>

        <h2 class="section-title">Groups</h2>

        <div class="grid">
            ${
                groups.data.map(group => `
                    <div class="group-card">
                        <h3>${group.group.name}</h3>
                        <p>Role: ${group.role.name}</p>
                    </div>
                `).join("")
            }
        </div>

        <br><br>

        <h2 class="section-title">Badges</h2>

        <div class="grid">
            ${
                badges.data.map(badge => `
                    <div class="badge-card">
                        <h3>${badge.name}</h3>
                        <p>${badge.description || "No description."}</p>
                    </div>
                `).join("")
            }
        </div>

        `;
    }

    catch(err){
        loading.innerHTML = "";
        error.innerHTML = "Something went wrong.";
        console.error(err);
    }
}

</script>

</body>
</html>
